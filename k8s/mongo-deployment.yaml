apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: traceback-mongo-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traceback-mongo
spec:
  replicas: 1

  selector:
    matchLabels:
      app: traceback-mongo

  template:
    metadata:
      labels:
        app: traceback-mongo

    spec:
      containers:
        - name: mongo
          image: mongo:8

          ports:
            - containerPort: 27017

          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db

      volumes:
        - name: mongo-storage
          persistentVolumeClaim:
            claimName: traceback-mongo-pvc